name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]"

      - name: Run backend tests
        run: python -m pytest backend/tests -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Run frontend type check
        working-directory: frontend
        run: npm exec tsc -- --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check markdown and text hygiene
        run: |
          python - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          text_suffixes = {
              ".css",
              ".html",
              ".json",
              ".md",
              ".py",
              ".toml",
              ".ts",
              ".tsx",
              ".yml",
              ".yaml",
          }
          tracked_files = [
              filename
              for filename in subprocess.check_output(
                  ["git", "ls-files"],
                  text=True,
              ).splitlines()
              if Path(filename).exists()
          ]

          hygiene_errors = []
          for filename in tracked_files:
              path = Path(filename)
              if path.suffix.lower() not in text_suffixes:
                  continue
              text = path.read_text(encoding="utf-8")
              if "\ufffd" in text:
                  hygiene_errors.append(f"{filename}: contains replacement character")
              for line_number, line in enumerate(text.splitlines(), start=1):
                  if line.startswith(("<<<<<<<", "=======", ">>>>>>>")):
                      hygiene_errors.append(f"{filename}:{line_number}: merge conflict marker")

          link_errors = []
          markdown_files = [Path(filename) for filename in tracked_files if filename.endswith(".md")]
          link_pattern = re.compile(r"\[[^\]]+\]\(([^)]+)\)")
          for path in markdown_files:
              text = path.read_text(encoding="utf-8")
              for match in link_pattern.finditer(text):
                  target = match.group(1).strip().strip("<>")
                  if not target or "://" in target or target.startswith("#") or target.startswith("mailto:"):
                      continue
                  target_path = target.split("#", 1)[0]
                  if not target_path:
                      continue
                  resolved = (path.parent / target_path).resolve()
                  if not resolved.exists():
                      link_errors.append(f"{path}:{target} -> {resolved}")

          errors = hygiene_errors + link_errors
          if errors:
              raise SystemExit("\n".join(errors))
          print("OK: docs and tracked text files passed hygiene checks")
          PY
